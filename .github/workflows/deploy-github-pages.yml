# Static client → GitHub Pages (Monorepo: nur client bauen).
# Repo: Settings → Pages → Build: GitHub Actions.
# Variable: Settings → Secrets and variables → Actions → Variables → VITE_COLYSEUS_URL
# (öffentliche Backend-URL, idealerweise https://… für Mixed-Content mit Pages).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        env:
          # Repo-Name anpassen, falls URL in Pages-Einstellungen abweicht (Groß/Kleinschreibung).
          VITE_BASE_PATH: /BattleFleet-Arena/
          VITE_COLYSEUS_URL: ${{ vars.VITE_COLYSEUS_URL }}
        run: npm run build -w client

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
