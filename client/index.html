<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BattleFleet-Arena — Task 12: Klassen &amp; Audio</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #5ec8f5; }
      #app { width: 100%; height: 100%; }
      /**
       * Globale HUD-Skalierung (~ Browser-Zoom 80 %).
       * transform-origin je Element, damit Ecken/Anker stimmen.
       */
      :root {
        --hud-ui-scale: 0.8;
        --cockpit-hud-edge: 16px;
        /* Flex-Gap innerhalb skalierter Brücke/OPZ: wirkt nach scale(0.8) wie 16px Rand */
        --cockpit-hud-inner-gap: calc(var(--cockpit-hud-edge) / var(--hud-ui-scale));
      }
      #hud {
        position: fixed; left: 16px; bottom: 16px; color: #9fb8d4;
        font-family: system-ui, sans-serif; font-size: 11px;
        text-shadow: 0 1px 2px #000; pointer-events: none; line-height: 1.45;
        opacity: 0.92; max-width: min(240px, 38vw); z-index: 12;
        transform: scale(var(--hud-ui-scale));
        transform-origin: bottom left;
      }
      #title {
        position: fixed; top: 16px; left: 50%;
        transform: translateX(-50%) scale(var(--hud-ui-scale));
        transform-origin: top center;
        color: #8ecfff; font-family: system-ui, sans-serif; font-size: 14px;
        letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.9;
      }
      .cockpit-hud-root {
        position: fixed; inset: 0; pointer-events: none; z-index: 11;
        --speed-glow: 0.2;
      }
      /* Skalierung je Seite — Anker bleiben an linkem/rechtem Rand (nicht zur Mitte ziehen). */
      .cockpit-bridge {
        position: absolute; left: 16px; top: 16px;
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: var(--cockpit-hud-inner-gap);
        transform: scale(var(--hud-ui-scale));
        transform-origin: top left;
      }
      .cockpit-opz {
        position: absolute; right: 16px; top: 16px;
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: var(--cockpit-hud-inner-gap);
        transform: scale(var(--hud-ui-scale));
        transform-origin: top right;
      }
      .cockpit-panel {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding: 10px 14px 12px;
        min-width: 200px;
        max-width: 268px;
        background: linear-gradient(180deg, rgba(12,28,52,0.94), rgba(8,18,36,0.97));
        border: 1px solid rgba(120, 190, 255, 0.28);
        border-radius: 10px;
        box-shadow:
          0 0 0 1px rgba(0,0,0,0.35) inset,
          0 8px 28px rgba(0,0,0,0.45),
          0 0 calc(18px + var(--speed-glow) * 22px) rgba(80, 170, 255, var(--speed-glow));
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .cockpit-panel-head {
        display: flex; align-items: center; gap: 8px;
        padding-bottom: 4px;
        margin-bottom: 2px;
        border-bottom: 1px solid rgba(100, 160, 220, 0.22);
      }
      .cockpit-panel-head--bridge {
        justify-content: center;
      }
      .cockpit-panel-head--opz {
        justify-content: center;
      }
      .cockpit-panel-title {
        font-weight: 700; letter-spacing: 0.12em; font-size: 10px;
        color: rgba(200, 230, 255, 0.88);
      }
      .cockpit-compass-wrap {
        align-self: center;
        width: 112px; height: 112px;
        border-radius: 50%;
        border: 2px solid rgba(100, 170, 230, 0.35);
        box-shadow: 0 0 16px rgba(40, 120, 200, 0.15) inset, 0 4px 14px rgba(0,0,0,0.4);
        background: radial-gradient(circle at 50% 50%, #0a1a30 0%, #040a14 100%);
      }
      .cockpit-compass-svg { display: block; width: 100%; height: 100%; }
      .cockpit-compass-rim {
        stroke: rgba(140, 200, 255, 0.45); stroke-width: 1.2;
        filter: drop-shadow(0 0 4px rgba(100, 180, 255, 0.35));
      }
      .cockpit-compass-lubber {
        fill: rgba(255, 220, 120, 0.55);
        stroke: rgba(255, 240, 200, 0.85); stroke-width: 0.6;
      }
      .cockpit-compass-tick {
        stroke: rgba(180, 220, 255, 0.55); stroke-width: 1.1;
      }
      .cockpit-compass-tick-sec {
        stroke: rgba(140, 180, 220, 0.28); stroke-width: 0.7;
      }
      .cockpit-compass-cardinal {
        fill: rgba(210, 235, 255, 0.92);
        font-size: 11px; font-weight: 700;
        font-family: ui-monospace, Consolas, monospace;
      }
      .cockpit-compass-ctr-diamond {
        fill: rgba(255, 200, 120, 0.95);
        stroke: rgba(255, 240, 200, 0.9); stroke-width: 0.5;
        filter: drop-shadow(0 0 5px rgba(255, 200, 100, 0.85));
      }
      .cockpit-subhead {
        grid-column: 1/-1;
        font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
        color: rgba(160, 210, 255, 0.65); margin-bottom: 2px;
      }
      .cockpit-hp-opz {
        width: 100%;
        padding-top: 6px;
        margin-top: 2px;
      }
      .cockpit-weapons-block {
        display: flex; flex-direction: column; gap: 6px;
        width: 100%;
        padding-top: 4px;
        border-top: 1px solid rgba(0, 255, 100, 0.12);
      }
      .cockpit-aswm-mag {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 12px;
        width: 100%;
        align-items: start;
      }
      .cockpit-aswm-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        min-width: 0;
        width: fit-content;
        max-width: 100%;
      }
      .cockpit-aswm-col--port {
        justify-self: start;
      }
      .cockpit-aswm-col--starboard {
        justify-self: end;
      }
      .cockpit-aswm-col-label {
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(160, 210, 255, 0.75);
        font-weight: 600;
      }
      .cockpit-aswm-dots {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        flex-wrap: nowrap;
      }
      .cockpit-aswm-dot-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 5px;
        flex-wrap: nowrap;
      }
      .cockpit-aswm-dot {
        display: inline-block;
        box-sizing: border-box;
        width: 10px;
        height: 10px;
        min-width: 10px;
        min-height: 10px;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.55);
        flex-shrink: 0;
        vertical-align: middle;
      }
      .cockpit-aswm-dot--ready {
        background-color: #1ecf4a;
        color: #1ecf4a;
        box-shadow: 0 0 6px rgba(30, 207, 74, 0.95);
      }
      .cockpit-aswm-dot--fired {
        background-color: #e02020;
        color: #e02020;
        box-shadow: 0 0 5px rgba(224, 32, 32, 0.85);
      }
      .cockpit-schematic-wrap {
        width: 100%;
        padding-top: 6px;
        border-top: 1px solid rgba(100, 160, 220, 0.18);
      }
      .cockpit-schematic-host {
        min-height: 118px;
        display: flex; align-items: center; justify-content: center;
      }
      .cockpit-schematic-svg { width: 100%; max-height: 132px; }
      .cockpit-schematic-hull {
        fill: rgba(60, 100, 150, 0.25);
        stroke: rgba(140, 190, 240, 0.55); stroke-width: 1;
      }
      .cockpit-schematic-mount { stroke: rgba(0,0,0,0.35); stroke-width: 0.4; }
      .cockpit-schematic-mount--arty { fill: rgba(255, 180, 120, 0.95); }
      .cockpit-schematic-mount--ciws { fill: rgba(120, 255, 180, 0.9); }
      .cockpit-schematic-mount--sam { fill: rgba(120, 200, 255, 0.95); }
      .cockpit-schematic-mount--pd { fill: rgba(255, 210, 100, 0.95); }
      .cockpit-schematic-mount--torp { fill: rgba(100, 220, 255, 0.9); }
      .cockpit-schematic-mount--ssm { fill: rgba(220, 160, 255, 0.95); }
      .cockpit-schematic-mount--gen { fill: rgba(180, 190, 210, 0.85); }
      .cockpit-schematic-train {
        stroke: rgba(255, 220, 140, 0.95); stroke-width: 1.4;
        stroke-linecap: round;
      }
      .cockpit-schematic-fixed {
        stroke: rgba(255, 160, 220, 0.85); stroke-width: 1.2;
        stroke-linecap: round;
      }
      .cockpit-readouts {
        display: flex; flex-direction: column; justify-content: center;
        gap: 8px; min-width: 168px; width: 100%;
      }
      .cockpit-row {
        display: flex; align-items: baseline; justify-content: space-between;
        gap: 12px; color: #b8d4ee; font-size: 12px;
      }
      .cockpit-label { opacity: 0.75; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
      .cockpit-speed-val { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; color: #e8f4ff; }
      .cockpit-speed-unit { font-size: 12px; opacity: 0.75; }
      .cockpit-course { font-variant-numeric: tabular-nums; font-weight: 600; color: #9ee8c8; }
      .cockpit-row-rank { align-items: flex-start; }
      .cockpit-row-bar { align-items: center; }
      .cockpit-row-bar .cockpit-label { align-self: center; }
      .cockpit-track {
        position: relative; flex: 1; height: 8px; border-radius: 4px;
        background: rgba(255,255,255,0.06);
        overflow: hidden;
        border: 1px solid rgba(100, 160, 220, 0.2);
      }
      .cockpit-track-mid {
        position: absolute; left: 50%; top: 0; bottom: 0; width: 1px;
        background: rgba(255,255,255,0.35); transform: translateX(-50%); z-index: 1;
      }
      .cockpit-fill {
        position: absolute; top: 0; bottom: 0; height: 100%;
        border-radius: 3px;
      }
      .cockpit-track-hp .cockpit-fill-hp { min-width: 3px; }
      .cockpit-primary-cd { font-variant-numeric: tabular-nums; font-weight: 600; color: #ffc9a0; font-size: 13px; }
      .cockpit-secondary-cd { font-variant-numeric: tabular-nums; font-weight: 600; color: #ffb8e8; font-size: 13px; }
      .cockpit-life-status { font-variant-numeric: tabular-nums; font-weight: 600; color: #9ecbff; font-size: 13px; text-align: right; }
      .cockpit-row-life.hidden { display: none; }
      .cockpit-rank-en {
        font-weight: 600; color: #c8b8ff; font-size: 12px; line-height: 1.25;
        max-width: 220px; text-align: right; text-wrap: balance;
      }
      .cockpit-xp { font-variant-numeric: tabular-nums; font-weight: 600; color: #9ee0c8; font-size: 12px; }
      .cockpit-match-time { font-variant-numeric: tabular-nums; font-weight: 600; color: #a8e8ff; font-size: 13px; }
      .cockpit-match-score { font-variant-numeric: tabular-nums; font-weight: 600; color: #ffe9a8; font-size: 13px; }
      .cockpit-kills { opacity: 0.85; font-weight: 500; }

      /* Plan-Radar — phosphorgrün, 80er-Terminal-Stil (über der Textspalte) */
      .cockpit-radar {
        display: flex; flex-direction: column; align-items: center; gap: 4px;
        flex-shrink: 0;
        align-self: center;
        padding-bottom: 6px;
        margin-bottom: 2px;
        border-bottom: 1px solid rgba(0, 255, 100, 0.1);
      }
      .cockpit-radar-hidden {
        opacity: 0.35;
        filter: saturate(0.5);
      }
      .cockpit-radar-head {
        display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
        gap: 8px 12px; width: 100%; max-width: 200px;
      }
      .cockpit-radar-title {
        font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
        font-size: 9px; letter-spacing: 0.28em; color: #00ff66;
        text-shadow: 0 0 6px rgba(0, 255, 102, 0.75), 0 0 14px rgba(0, 255, 80, 0.35);
        opacity: 0.92;
      }
      .cockpit-own-radar-status {
        font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
        font-size: 8px; letter-spacing: 0.06em; color: #88ffaa;
        text-shadow: 0 0 4px rgba(0, 255, 120, 0.5);
      }
      .cockpit-own-radar-status.cockpit-own-radar-off {
        color: #668866;
        text-shadow: none;
        opacity: 0.75;
      }
      .cockpit-radar-bezel {
        position: relative;
        width: 112px; height: 112px;
        border-radius: 50%;
        border: 2px solid #0a3d1a;
        box-shadow:
          0 0 0 1px rgba(0, 255, 100, 0.25) inset,
          0 0 20px rgba(0, 255, 80, 0.12),
          0 4px 12px rgba(0, 0, 0, 0.5);
        background: radial-gradient(circle at 50% 50%, #001a0d 0%, #000806 100%);
      }
      .cockpit-radar-svg {
        display: block; width: 100%; height: 100%;
      }
      .cockpit-radar-ring-outer {
        stroke: rgba(0, 255, 100, 0.55); stroke-width: 1.2;
        filter: drop-shadow(0 0 3px rgba(0, 255, 100, 0.4));
      }
      .cockpit-radar-ring-mid, .cockpit-radar-ring-inner {
        stroke: rgba(0, 255, 90, 0.28); stroke-width: 0.9;
      }
      .cockpit-radar-axis {
        stroke: rgba(0, 255, 100, 0.22); stroke-width: 0.7;
      }
      .cockpit-radar-axis-45 {
        stroke: rgba(0, 255, 100, 0.16); stroke-width: 0.65;
      }
      .cockpit-radar-bow {
        fill: rgba(0, 255, 120, 0.35);
        stroke: rgba(0, 255, 100, 0.65); stroke-width: 0.6;
      }
      .cockpit-radar-ownship {
        fill: #00ff88;
        filter: drop-shadow(0 0 4px rgba(0, 255, 120, 0.9));
      }
      .cockpit-radar-blip {
        fill: #66ff99;
        stroke: #00ff66;
        stroke-width: 0.4;
        filter: drop-shadow(0 0 5px rgba(0, 255, 100, 0.95));
      }
      .cockpit-radar-esm-line {
        fill: none;
        stroke: rgba(255, 200, 80, 0.95);
        stroke-width: 1.35;
        stroke-dasharray: 4 3;
        stroke-linecap: round;
        filter: drop-shadow(0 0 4px rgba(255, 200, 100, 0.85));
      }
      .cockpit-radar-scan {
        pointer-events: none;
        position: absolute; inset: 0; border-radius: 50%;
        background: repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 2px,
          rgba(0, 255, 80, 0.05) 2px,
          rgba(0, 255, 80, 0.05) 3px
        );
        animation: cockpit-radar-flicker 3.5s ease-in-out infinite;
        mix-blend-mode: screen;
      }
      @keyframes cockpit-radar-flicker {
        0%, 100% { opacity: 0.38; }
        50% { opacity: 0.52; }
      }
      .cockpit-radar-foot {
        display: flex; align-items: baseline; justify-content: center; gap: 10px;
        flex-wrap: wrap; width: 100%; max-width: 200px;
      }
      .cockpit-radar-range {
        font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
        font-size: 9px; color: #00cc55;
        text-shadow: 0 0 4px rgba(0, 255, 100, 0.5);
        opacity: 0.85;
      }
      .cockpit-radar-esm-hint {
        font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
        font-size: 8px; letter-spacing: 0.2em; color: rgba(255, 200, 100, 0.75);
        text-shadow: 0 0 6px rgba(255, 180, 60, 0.45);
      }

      .match-end-overlay {
        position: fixed; inset: 0; z-index: 200;
        display: flex; align-items: center; justify-content: center;
        background: rgba(6, 14, 28, 0.82);
        backdrop-filter: blur(4px);
        pointer-events: auto;
      }
      .match-end-overlay[hidden] { display: none !important; }
      .match-end-panel {
        transform: scale(var(--hud-ui-scale));
        transform-origin: center center;
        max-width: 420px; width: 90%; padding: 24px 28px;
        background: linear-gradient(180deg, rgba(14, 32, 56, 0.98), rgba(8, 20, 40, 0.99));
        border: 1px solid rgba(120, 190, 255, 0.35);
        border-radius: 12px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #cfe8ff;
      }
      .match-end-title { font-size: 1.35rem; margin-bottom: 8px; color: #e8f4ff; font-weight: 700; }
      .match-end-sub { font-size: 0.85rem; opacity: 0.8; margin-bottom: 18px; line-height: 1.45; }
      .match-end-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      .match-end-table th, .match-end-table td { text-align: left; padding: 8px 6px; border-bottom: 1px solid rgba(100, 160, 220, 0.2); }
      .match-end-table th { text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.68rem; opacity: 0.75; }
      .match-end-row-me { background: rgba(80, 160, 255, 0.12); }
      .match-end-replay {
        margin-top: 20px; width: 100%; padding: 12px 16px;
        font-size: 1rem; font-weight: 600;
        color: #0a1828; background: linear-gradient(180deg, #9fd8ff, #6ab8f0);
        border: none; border-radius: 8px; cursor: pointer;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }
      .match-end-replay:hover { filter: brightness(1.06); }

      .class-picker-overlay {
        position: fixed; inset: 0; z-index: 300;
        display: flex; align-items: center; justify-content: center;
        background: rgba(4, 12, 28, 0.92);
        pointer-events: auto;
      }
      .class-picker-panel {
        transform: scale(var(--hud-ui-scale));
        transform-origin: center center;
        max-width: 520px; width: 92%; padding: 28px 26px;
        background: linear-gradient(180deg, rgba(16, 36, 64, 0.98), rgba(6, 16, 36, 0.99));
        border: 1px solid rgba(100, 180, 255, 0.4);
        border-radius: 14px;
        box-shadow: 0 20px 56px rgba(0, 0, 0, 0.55);
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #d8ecff;
      }
      .class-picker-title { font-size: 1.5rem; margin-bottom: 8px; color: #f0f8ff; font-weight: 700; }
      .class-picker-hint { font-size: 0.88rem; opacity: 0.82; margin-bottom: 16px; line-height: 1.45; }
      .class-picker-name-label {
        display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px;
      }
      .class-picker-name-caption {
        font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; opacity: 0.78;
      }
      .class-picker-name-input {
        width: 100%; padding: 10px 12px; border-radius: 8px;
        border: 1px solid rgba(100, 170, 240, 0.45);
        background: rgba(6, 20, 44, 0.85); color: #e8f4ff;
        font: inherit; font-size: 0.95rem;
      }
      .class-picker-name-input::placeholder { opacity: 0.45; }
      .class-picker-name-input:focus {
        outline: none; border-color: rgba(150, 210, 255, 0.75);
        box-shadow: 0 0 0 2px rgba(80, 160, 255, 0.25);
      }
      .class-picker-continue-btn {
        width: 100%; padding: 12px 16px;
        font-size: 1rem; font-weight: 600;
        color: #0a1828; background: linear-gradient(180deg, #9fd8ff, #6ab8f0);
        border: none; border-radius: 8px; cursor: pointer;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }
      .class-picker-continue-btn:hover { filter: brightness(1.06); }

      .ship-editor-overlay {
        position: fixed; inset: 0; z-index: 400;
        display: flex; align-items: center; justify-content: center;
        background: rgba(2, 8, 20, 0.94);
        overflow-y: auto; padding: 24px 12px;
      }
      .ship-editor-panel {
        transform: scale(var(--hud-ui-scale));
        transform-origin: center center;
        max-width: 560px; width: 100%; padding: 22px 22px 26px;
        background: linear-gradient(180deg, rgba(14, 32, 56, 0.99), rgba(6, 14, 32, 0.99));
        border: 1px solid rgba(110, 190, 255, 0.42);
        border-radius: 14px;
        color: #d4e8ff;
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 0.88rem;
        line-height: 1.45;
      }
      .ship-editor-title { font-size: 1.35rem; color: #f4fbff; margin-bottom: 8px; font-weight: 700; }
      .ship-editor-hint { opacity: 0.88; margin-bottom: 14px; font-size: 0.82rem; }
      .ship-editor-hint code { font-size: 0.78em; opacity: 0.95; }
      .ship-editor-class-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
      .ship-editor-class-btn {
        flex: 1; min-width: 90px; padding: 8px 10px; border-radius: 8px;
        border: 1px solid rgba(90, 160, 220, 0.4);
        background: rgba(10, 28, 52, 0.75); color: #b8dcff;
        font: inherit; cursor: pointer; font-size: 0.82rem;
      }
      .ship-editor-class-btn.is-active {
        border-color: rgba(140, 210, 255, 0.85);
        background: rgba(28, 72, 120, 0.9); color: #fff;
      }
      .ship-editor-field {
        display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px;
      }
      .ship-editor-field span:first-child { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.75; }
      .ship-editor-input, .ship-editor-num {
        padding: 8px 10px; border-radius: 6px;
        border: 1px solid rgba(100, 170, 240, 0.4);
        background: rgba(4, 16, 36, 0.9); color: #eef6ff; font: inherit;
      }
      .ship-editor-range { width: 100%; accent-color: #6ab8ff; }
      .ship-editor-range-val { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; display: block; }
      .ship-editor-subtitle { margin: 12px 0 8px; font-weight: 600; color: #9ecfff; font-size: 0.85rem; }
      .ship-editor-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px;
      }
      .ship-editor-grid label { display: flex; flex-direction: column; gap: 4px; font-size: 0.72rem; opacity: 0.9; }
      .ship-editor-check { display: flex; align-items: center; gap: 8px; margin: 10px 0; cursor: pointer; font-size: 0.82rem; }

      /* In .cockpit-opz eingehängt — gleicher Abstand zum OPZ wie Rand zum Bildschirm (nach Skalierung) */
      .message-log-panel {
        position: relative;
        flex-shrink: 0;
        z-index: 12;
        width: min(280px, 34vw);
        max-height: min(200px, 36vh);
        overflow: hidden;
        display: flex; flex-direction: column;
        padding: 8px 10px 10px;

        border-radius: 8px;

      .message-log-head {

      .message-log-list {

      .game-message-hud {
        display: none;
        position: fixed;
        top: 12%;
        left: 50%;
        z-index: 10000;

        transform-origin: top center;

        min-height: 76px;
        box-sizing: border-box;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 14px 18px;
        text-align: center;
        font-family: system-ui, sans-serif;
        pointer-events: none;
        background: transparent;
        border: none;
      }

      /* In .cockpit-bridge eingehängt — skaliert mit Panel, Abstand per Flex gap */
      #debug-overlay {
        position: relative;
        flex-shrink: 0;
        z-index: 8500;
        font: 11px/1.4 system-ui, sans-serif;

      .bot-debug-panel {
        position: fixed;
        right: var(--cockpit-hud-edge);
        bottom: var(--cockpit-hud-edge);
        left: auto;
        top: auto;
        z-index: 8550;
        transform: scale(var(--hud-ui-scale));
        transform-origin: bottom right;
        font: 11px/1.4 system-ui, sans-serif;
        color: #d7ecff;

      .environment-debug-panel {
