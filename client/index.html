<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BattleFleet-Arena — Task 12: Klassen &amp; Audio</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #5ec8f5; }
      #app { width: 100%; height: 100%; }
      #hud {
        position: fixed; left: 16px; bottom: 16px; color: #9fb8d4;
        font-family: system-ui, sans-serif; font-size: 11px;
        text-shadow: 0 1px 2px #000; pointer-events: none; line-height: 1.45;
        opacity: 0.92; max-width: 200px;
      }
      #title {
        position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
        color: #8ecfff; font-family: system-ui, sans-serif; font-size: 14px;
        letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.9;
      }
      .cockpit {
        position: fixed; left: 16px; top: 16px;
        pointer-events: none; z-index: 10;
        --speed-glow: 0.2;
      }
      .cockpit-panel {
        display: flex; align-items: stretch; gap: 14px;
        padding: 10px 14px 12px;
        background: linear-gradient(180deg, rgba(12,28,52,0.92), rgba(8,18,36,0.96));
        border: 1px solid rgba(120, 190, 255, 0.28);
        border-radius: 10px;
        box-shadow:
          0 0 0 1px rgba(0,0,0,0.35) inset,
          0 8px 28px rgba(0,0,0,0.45),
          0 0 calc(18px + var(--speed-glow) * 22px) rgba(80, 170, 255, var(--speed-glow));
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .cockpit-readouts {
        display: flex; flex-direction: column; justify-content: center;
        gap: 8px; min-width: 168px;
      }
      .cockpit-row {
        display: flex; align-items: baseline; justify-content: space-between;
        gap: 12px; color: #b8d4ee; font-size: 12px;
      }
      .cockpit-label { opacity: 0.75; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
      .cockpit-speed-val { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; color: #e8f4ff; }
      .cockpit-speed-unit { font-size: 12px; opacity: 0.75; }
      .cockpit-course { font-variant-numeric: tabular-nums; font-weight: 600; color: #9ee8c8; }
      .cockpit-row-rank { align-items: flex-start; }
      .cockpit-row-bar { align-items: center; }
      .cockpit-row-bar .cockpit-label { align-self: center; }
      .cockpit-track {
        position: relative; flex: 1; height: 8px; border-radius: 4px;
        background: rgba(255,255,255,0.06);
        overflow: hidden;
        border: 1px solid rgba(100, 160, 220, 0.2);
      }
      .cockpit-track-mid {
        position: absolute; left: 50%; top: 0; bottom: 0; width: 1px;
        background: rgba(255,255,255,0.35); transform: translateX(-50%); z-index: 1;
      }
      .cockpit-fill {
        position: absolute; top: 0; bottom: 0; height: 100%;
        border-radius: 3px;
      }
      .cockpit-track-hp .cockpit-fill-hp { min-width: 3px; }
      .cockpit-primary-cd { font-variant-numeric: tabular-nums; font-weight: 600; color: #ffc9a0; font-size: 13px; }
      .cockpit-secondary-cd { font-variant-numeric: tabular-nums; font-weight: 600; color: #ffb8e8; font-size: 13px; }
      .cockpit-life-status { font-variant-numeric: tabular-nums; font-weight: 600; color: #9ecbff; font-size: 13px; text-align: right; }
      .cockpit-row-life.hidden { display: none; }
      .cockpit-rank-en {
        font-weight: 600; color: #c8b8ff; font-size: 12px; line-height: 1.25;
        max-width: 220px; text-align: right; text-wrap: balance;
      }
      .cockpit-xp { font-variant-numeric: tabular-nums; font-weight: 600; color: #9ee0c8; font-size: 12px; }
      .cockpit-match-time { font-variant-numeric: tabular-nums; font-weight: 600; color: #a8e8ff; font-size: 13px; }
      .cockpit-match-score { font-variant-numeric: tabular-nums; font-weight: 600; color: #ffe9a8; font-size: 13px; }
      .cockpit-kills { opacity: 0.85; font-weight: 500; }

      .match-end-overlay {
        position: fixed; inset: 0; z-index: 200;
        display: flex; align-items: center; justify-content: center;
        background: rgba(6, 14, 28, 0.82);
        backdrop-filter: blur(4px);
        pointer-events: auto;
      }
      .match-end-overlay[hidden] { display: none !important; }
      .match-end-panel {
        max-width: 420px; width: 90%; padding: 24px 28px;
        background: linear-gradient(180deg, rgba(14, 32, 56, 0.98), rgba(8, 20, 40, 0.99));
        border: 1px solid rgba(120, 190, 255, 0.35);
        border-radius: 12px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #cfe8ff;
      }
      .match-end-title { font-size: 1.35rem; margin-bottom: 8px; color: #e8f4ff; font-weight: 700; }
      .match-end-sub { font-size: 0.85rem; opacity: 0.8; margin-bottom: 18px; line-height: 1.45; }
      .match-end-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      .match-end-table th, .match-end-table td { text-align: left; padding: 8px 6px; border-bottom: 1px solid rgba(100, 160, 220, 0.2); }
      .match-end-table th { text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.68rem; opacity: 0.75; }
      .match-end-row-me { background: rgba(80, 160, 255, 0.12); }
      .match-end-replay {
        margin-top: 20px; width: 100%; padding: 12px 16px;
        font-size: 1rem; font-weight: 600;
        color: #0a1828; background: linear-gradient(180deg, #9fd8ff, #6ab8f0);
        border: none; border-radius: 8px; cursor: pointer;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }
      .match-end-replay:hover { filter: brightness(1.06); }

      .class-picker-overlay {
        position: fixed; inset: 0; z-index: 300;
        display: flex; align-items: center; justify-content: center;
        background: rgba(4, 12, 28, 0.92);
        pointer-events: auto;
      }
      .class-picker-panel {
        max-width: 520px; width: 92%; padding: 28px 26px;
        background: linear-gradient(180deg, rgba(16, 36, 64, 0.98), rgba(6, 16, 36, 0.99));
        border: 1px solid rgba(100, 180, 255, 0.4);
        border-radius: 14px;
        box-shadow: 0 20px 56px rgba(0, 0, 0, 0.55);
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #d8ecff;
      }
      .class-picker-title { font-size: 1.5rem; margin-bottom: 8px; color: #f0f8ff; font-weight: 700; }
      .class-picker-hint { font-size: 0.88rem; opacity: 0.82; margin-bottom: 16px; line-height: 1.45; }
      .class-picker-name-label {
        display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px;
      }
      .class-picker-name-caption {
        font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; opacity: 0.78;
      }
      .class-picker-name-input {
        width: 100%; padding: 10px 12px; border-radius: 8px;
        border: 1px solid rgba(100, 170, 240, 0.45);
        background: rgba(6, 20, 44, 0.85); color: #e8f4ff;
        font: inherit; font-size: 0.95rem;
      }
      .class-picker-name-input::placeholder { opacity: 0.45; }
      .class-picker-name-input:focus {
        outline: none; border-color: rgba(150, 210, 255, 0.75);
        box-shadow: 0 0 0 2px rgba(80, 160, 255, 0.25);
      }
      .class-picker-continue-btn {
        width: 100%; padding: 12px 16px;
        font-size: 1rem; font-weight: 600;
        color: #0a1828; background: linear-gradient(180deg, #9fd8ff, #6ab8f0);
        border: none; border-radius: 8px; cursor: pointer;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }
      .class-picker-continue-btn:hover { filter: brightness(1.06); }

      .ship-editor-overlay {
        position: fixed; inset: 0; z-index: 400;
        display: flex; align-items: center; justify-content: center;
        background: rgba(2, 8, 20, 0.94);
        overflow-y: auto; padding: 24px 12px;
      }
      .ship-editor-panel {
        max-width: 560px; width: 100%; padding: 22px 22px 26px;
        background: linear-gradient(180deg, rgba(14, 32, 56, 0.99), rgba(6, 14, 32, 0.99));
        border: 1px solid rgba(110, 190, 255, 0.42);
        border-radius: 14px;
        color: #d4e8ff;
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 0.88rem;
        line-height: 1.45;
      }
      .ship-editor-title { font-size: 1.35rem; color: #f4fbff; margin-bottom: 8px; font-weight: 700; }
      .ship-editor-hint { opacity: 0.88; margin-bottom: 14px; font-size: 0.82rem; }
      .ship-editor-hint code { font-size: 0.78em; opacity: 0.95; }
      .ship-editor-class-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
      .ship-editor-class-btn {
        flex: 1; min-width: 90px; padding: 8px 10px; border-radius: 8px;
        border: 1px solid rgba(90, 160, 220, 0.4);
        background: rgba(10, 28, 52, 0.75); color: #b8dcff;
        font: inherit; cursor: pointer; font-size: 0.82rem;
      }
      .ship-editor-class-btn.is-active {
        border-color: rgba(140, 210, 255, 0.85);
        background: rgba(28, 72, 120, 0.9); color: #fff;
      }
      .ship-editor-field {
        display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px;
      }
      .ship-editor-field span:first-child { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.75; }
      .ship-editor-input, .ship-editor-num {
        padding: 8px 10px; border-radius: 6px;
        border: 1px solid rgba(100, 170, 240, 0.4);
        background: rgba(4, 16, 36, 0.9); color: #eef6ff; font: inherit;
      }
      .ship-editor-range { width: 100%; accent-color: #6ab8ff; }
      .ship-editor-range-val { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; display: block; }
      .ship-editor-subtitle { margin: 12px 0 8px; font-weight: 600; color: #9ecfff; font-size: 0.85rem; }
      .ship-editor-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px;
      }
      .ship-editor-grid label { display: flex; flex-direction: column; gap: 4px; font-size: 0.72rem; opacity: 0.9; }
      .ship-editor-check { display: flex; align-items: center; gap: 8px; margin: 10px 0; cursor: pointer; font-size: 0.82rem; }
      .ship-editor-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
      .ship-editor-btn {
        padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(100, 170, 230, 0.45);
        background: rgba(12, 36, 64, 0.85); color: #cfe8ff; font: inherit; font-size: 0.82rem; cursor: pointer;
      }
      .ship-editor-btn:hover { filter: brightness(1.08); }
      .ship-editor-btn-primary {
        border-color: rgba(140, 210, 255, 0.75);
        background: linear-gradient(180deg, rgba(40, 100, 160, 0.95), rgba(20, 60, 110, 0.98));
        color: #fff; font-weight: 600;
      }
      .ship-editor-file { display: inline-block; cursor: pointer; text-align: center; }

      .cockpit-ship-class { font-weight: 600; color: #a8d4ff; font-size: 13px; }
      .cockpit-player-name { font-weight: 600; color: #d0c8ff; font-size: 13px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
    </style>
  </head>
  <body>
    <div id="title">BattleFleet-Arena — Task 12: Klassenwahl &amp; Kampf</div>
    <div id="app"></div>
    <div id="hud">
      <div>W / S — Gas zurück / voraus</div>
      <div>A / D — Ruder links / rechts</div>
      <div>Mausbewegung — Zielrichtung (Feuerbogen zum Bug)</div>
      <div>Linke Maustaste — Primär / Artillerie (0,5 s Cooldown)</div>
      <div>Rechte Maustaste — ASuM halten (Cooldown, max. 2 aktiv)</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
