<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BattleFleet — Schiffs-Workbench (Editor)</title>
    <link rel="stylesheet" href="/src/editor/editorShell.css" />
  </head>
  <body>
    <header class="ship-workbench-bar" role="banner">
      <div class="ship-workbench-bar__title">
        <strong>Schiffs-Workbench</strong>
        <span class="ship-workbench-bar__muted"
          >— Rumpf, Hitbox, JSON-Patches · Marker:
          <span class="ship-workbench-legend" title="Referenz in der Szene"
            ><span style="color: #33e6aa">●</span> Modellmitte
            <span style="color: #ff7722">●</span> Drehpunkt (shipPivotLocalZ)
            <span style="color: #cc66ff">●</span> Mount-Sockets
            <span style="color: #44ffaa">—</span> LW-Mittellinie (Sektor-Mitte)
            <span style="color: #ffaa44">⌒</span> Feuersektor
            <span style="color: #ffcc44">●</span> SSM-Rails
            <span style="color: #fff2aa">—</span> Rail-Azimut</span
          ></span
        >
      </div>
      <div class="ship-workbench-bar__actions">
        <label class="ship-workbench-bar__label">
          Klasse
          <select id="ship-workbench-class" aria-label="Schiffsklasse">
            <option value="fac">FAC</option>
            <option value="destroyer">Zerstörer</option>
            <option value="cruiser">Kreuzer</option>
          </select>
        </label>
        <a class="ship-workbench-btn" href="index.html">Zum Spiel</a>
      </div>
    </header>
    <div class="ship-workbench-body">
      <div id="app"></div>
      <aside id="ship-profile-dock" class="ship-profile-dock" aria-label="Schiffsprofil"></aside>
    </div>
    <script type="module" src="/src/editor/main.ts"></script>
  </body>
</html>
